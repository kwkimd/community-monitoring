<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파트너 여론 동향 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
       font-size: 14px; background: #f5f5f5; color: #212121; }
.container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
header { margin-bottom: 20px; }
header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.meta { font-size: 12px; color: #757575; }

.section { background: #fff; border-radius: 8px; padding: 20px;
           margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.section h2 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.empty { color: #9e9e9e; font-style: italic; }

/* Status cards */
.sc-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
.sc { flex: 1; min-width: 160px; border-radius: 6px; padding: 12px 14px;
      border: 1px solid #e0e0e0; }
.sc-ok   { background: #e8f5e9; border-color: #a5d6a7; }
.sc-err  { background: #ffebee; border-color: #ef9a9a; }
.sc-none { background: #f5f5f5; border-color: #e0e0e0; }
.sc-name   { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
.sc-detail { font-size: 12px; color: #616161; }
.sc-errmsg { font-size: 11px; color: #c62828; margin-top: 6px; word-break: break-all; }

/* Run log */
.run-log { border-top: 1px solid #f0f0f0; padding-top: 8px; }
.run-log > summary { font-size: 12px; color: #757575; cursor: pointer; padding: 2px 0; }
.log-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
.log-table th { background: #f5f5f5; padding: 5px 8px; text-align: left;
                border-bottom: 1px solid #ddd; white-space: nowrap; }
.log-table td { padding: 4px 8px; border-bottom: 1px solid #f5f5f5; vertical-align: top; }
.err-tip { color: #b71c1c; font-size: 11px; }

/* Chart */
.chart-wrap { height: 280px; position: relative; }

/* Archive table */
.tbl-wrap { overflow-x: auto; }
.arc-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.arc-table th { background: #f5f5f5; padding: 7px 10px; text-align: left;
                border-bottom: 2px solid #e0e0e0; white-space: nowrap; }
.arc-table td { padding: 7px 10px; border-bottom: 1px solid #f5f5f5; vertical-align: middle; }
.arc-table tr:hover td { background: #fafafa; }
.arc-table a { color: #1976d2; text-decoration: none; }
.arc-table a:hover { text-decoration: underline; }
.col-d { white-space: nowrap; color: #757575; }
.col-s { text-align: center; }
.nd { color: #bdbdbd; text-align: center; }

/* Level badges */
.lv { font-size: 12px; padding: 2px 8px; border-radius: 10px;
      white-space: nowrap; font-weight: 600; }
.lv0 { background: #eeeeee; color: #616161; }
.lv1 { background: #fff8e1; color: #f57f17; }
.lv2 { background: #fff3e0; color: #e65100; }
.lv3 { background: #ffebee; color: #c62828; }

/* Mode badges */
.mode-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.mode-weekly { background: #e3f2fd; color: #1565c0; }
.mode-daily  { background: #f3e5f5; color: #6a1b9a; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📊 파트너 여론 동향 대시보드</h1>
    <span class="meta">업데이트: 2026-04-22 14:58</span>
  </header>
  <section class="section">
  <h2>⚙️ 시스템 상태</h2>
  <div class="sc-row"><div class="sc sc-ok"><div class="sc-name">🟢 주간 리포트</div><div class="sc-detail">2026-04-22 14:58</div></div>
<div class="sc sc-none"><div class="sc-name">일간 리포트</div><div class="sc-detail">기록 없음</div></div>
<div class="sc sc-none"><div class="sc-name">모니터링</div><div class="sc-detail">기록 없음</div></div></div>
  <details class="run-log">
  <summary>실행 로그 (최근 1건)</summary>
  <table class="log-table">
    <thead><tr><th>시간</th><th>모드</th><th>기간</th><th>결과</th></tr></thead>
    <tbody><tr><td>2026-04-22 14:58</td><td>주간</td><td>4/13(월)~4/19(일)</td><td>✅</td></tr></tbody>
  </table>
</details>
</section>
  <section class="section">
  <h2>📈 서비스별 레벨 추이</h2>
  <p class="empty">주간 리포트 2회 이상 누적되면 차트가 표시됩니다.</p>
</section>
  <section class="section">
  <h2>📁 리포트 아카이브</h2>
  <div class="tbl-wrap">
  <table class="arc-table">
    <thead><tr><th>날짜</th><th>모드</th><th>기간</th><th>우리가게클릭</th><th>타임세일</th><th>한그릇</th><th>상태</th></tr></thead>
    <tbody><tr><td class="col-d">2026-04-22</td><td><span class="mode-badge mode-weekly">주간</span></td><td><a href="archives/report_%EC%A3%BC%EA%B0%84_4-13%28%EC%9B%94%29_4-19%28%EC%9D%BC%29.html">4/13(월)~4/19(일) 🔗</a></td><td><span class="lv lv2">🟠 주의</span></td><td><span class="lv lv1">🟡 관심</span></td><td><span class="lv lv1">🟡 관심</span></td><td class="col-s">✅</td></tr></tbody>
  </table>
  </div>
</section>
</div>

</body>
</html>
